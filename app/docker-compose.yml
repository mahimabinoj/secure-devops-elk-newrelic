version: '3'

services:
  backend-flask:
    image: mahimabinoj/lms-backend:2.0.0
    ports:
      - "4000:4000"
    environment:
      NEW_RELIC_LICENSE_KEY: eu01xab9a3b767b212ca458877cda5708e66NRAL
      NEW_RELIC_APP_NAME: lms-backend

  frontend:
    image: mahimabinoj/lms-frontend:2.0.0
    ports:
      - "80:80"
    depends_on:
      - backend-flask

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.1
    user: root
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml
    depends_on:
      - elasticsearch
